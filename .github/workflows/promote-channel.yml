name: Promote to Channel

# Promoção manual entre canais HCP: dev → hml → prod
# Use após validação em cada ambiente

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal HCP Packer de destino'
        required: true
        type: choice
        options:
          - dev
          - hml
          - prod
      bucket_name:
        description: 'Bucket HCP Packer'
        required: true
        default: 'base-images'
      iteration_id:
        description: 'Fingerprint da versão (vazio = mais recente)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  HCP_ORG_ID: '36728d8a-278b-44b1-af7d-462d60a11f6a'
  HCP_PROJECT_ID: '1c7acb8d-7539-4a33-8d4d-5ab419faaa85'

jobs:
  promote:
    name: Promote → ${{ inputs.channel }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.channel == 'prod' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to HCP
        uses: hashicorp/hcp-auth-action@v0
        with:
          workload_identity_provider: ${{ secrets.HCP_WORKLOAD_IDENTITY_PROVIDER }}
          audience: https://github.com/rocksempu

      - name: Setup HCP CLI
        uses: hashicorp/hcp-setup-action@v0
        with:
          version: latest

      - name: Promover iteração
        run: |
          chmod +x scripts/setup/hcp-promote-channel.sh
          scripts/setup/hcp-promote-channel.sh \
            "${{ inputs.bucket_name }}" \
            "${{ inputs.channel }}" \
            "${{ inputs.iteration_id }}"

          echo "### Promoção HCP Packer" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | ${{ inputs.bucket_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Canal | ${{ inputs.channel }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fingerprint | ${{ inputs.iteration_id || 'mais recente' }} |" >> $GITHUB_STEP_SUMMARY
